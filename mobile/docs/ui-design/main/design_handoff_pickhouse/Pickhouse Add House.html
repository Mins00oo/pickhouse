<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pickhouse — 집 추가</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
  html, body { margin: 0; padding: 0; font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif; background: #F4F1EA; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  *::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="pickhouse-shared.jsx"></script>
<script type="text/babel" src="pickhouse-add.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { AddWizard } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="add"
          title="집 추가 — 비선형 입력"
          subtitle="상단 탭을 눌러 원하는 항목부터 입력 · 관리비 포함 항목과 층 유형에 따라 아래 필드가 바뀝니다 (실제로 눌러보세요)"
        >
          <DCArtboard id="s1" label="1 · 기본 정보" width={402} height={874}>
            <AddWizard initialStep={1}/>
          </DCArtboard>
          <DCArtboard id="s2" label="2 · 가격 (관리비 조건부 필드)" width={402} height={874}>
            <AddWizard initialStep={2}/>
          </DCArtboard>
          <DCArtboard id="s3" label="3 · 구조 (평수·층 유형)" width={402} height={874}>
            <AddWizard initialStep={3}/>
          </DCArtboard>
          <DCArtboard id="s4" label="4 · 컨디션부터 바로 진입" width={402} height={874}>
            <AddWizard initialStep={4}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
