<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pickhouse — 비교 화면</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
<style>
  html, body { margin: 0; padding: 0; font-family: 'Pretendard Variable', Pretendard, -apple-system, system-ui, sans-serif; background: #F4F1EA; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; word-break: keep-all; }
  *::-webkit-scrollbar { display: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="pickhouse-shared.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="pickhouse-compare.jsx"></script>

<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { CompareFull, CompareSummary, ComparePicker } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="compare"
          title="비교 — 2개 1:1"
          subtitle="가운데 항목 라벨, 양옆에 두 집. 숫자는 ▲높음·▼낮음, 컨디션은 실제 값+색 (점수는 안 매김)"
        >
          <DCArtboard id="pick" label="① 비교할 2개 고르기" width={402} height={874}>
            <ComparePicker selected={[1, 3]}/>
          </DCArtboard>
          <DCArtboard id="sum" label="② 한눈에 요약 (무스크롤)" width={402} height={874}>
            <CompareSummary aId={1} bId={3}/>
          </DCArtboard>
          <DCArtboard id="full" label="③ 풀 비교표 (동기화 2열·스크롤)" width={402} height={874}>
            <CompareFull aId={1} bId={3}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
