services:
  mysql:
    image: mysql:8.0.39
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: pickhouse-backend:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER}
      APPLE_AUDIENCE: ${APPLE_AUDIENCE}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      PICKHOUSE_STORAGE_PATH: /var/lib/pickhouse/photos
      PICKHOUSE_PUBLIC_BASE_URL: ${PICKHOUSE_PUBLIC_BASE_URL}
    secrets:
      - jwt-private.pem
      - jwt-public.pem
    volumes:
      - photos-data:/var/lib/pickhouse/photos
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  mysql-data:
  photos-data:

secrets:
  jwt-private.pem:
    file: ./secrets/jwt-private.pem
  jwt-public.pem:
    file: ./secrets/jwt-public.pem
