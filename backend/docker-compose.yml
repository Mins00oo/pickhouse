services:
  mysql:
    image: mysql:8.0.39
    container_name: pickhouse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pickhouse
      MYSQL_USER: pickhouse
      MYSQL_PASSWORD: pickhouse
    ports:
      - "3306:3306"
    volumes:
      - pickhouse-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pickhouse", "-ppickhouse"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pickhouse-mysql-data:
