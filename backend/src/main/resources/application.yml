spring:
  application:
    name: pickhouse-backend
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
server:
  port: 8080
  forward-headers-strategy: framework
pickhouse:
  jwt:
    issuer: https://api.pickhouse.app
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 2592000
    private-key-path: classpath:jwt-private.pem
    public-key-path: classpath:jwt-public.pem
  oauth:
    apple:
      audience: ${APPLE_AUDIENCE:com.pickhouse.app}
      jwks-url: https://appleid.apple.com/auth/keys
    kakao:
      jwks-url: https://kauth.kakao.com/.well-known/jwks.json
      issuer: https://kauth.kakao.com
      audience: ${KAKAO_REST_API_KEY:dummy-kakao-key}
  storage:
    path: ${PICKHOUSE_STORAGE_PATH:./uploads}
    public-base-url: ${PICKHOUSE_PUBLIC_BASE_URL:http://localhost:8080}
    max-file-size-bytes: 10485760
  account:
    grace-period-days: 30
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
