spring:
  application:
    name: homes
  config:
    import: "optional:file:./homes-secrets.properties"
  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

# SQL 로그는 p6spy가 담당 (logback의 'p6spy' 로거 -> SQL 파일)
decorator:
  datasource:
    p6spy:
      enable-logging: true

# 비밀값은 homes-secrets.properties 에서 주입 (jwt.secret 등)
jwt:
  access-token:
    expires: PT30M

oauth:
  kakao:
    issuer: https://kauth.kakao.com
    jwks-uri: https://kauth.kakao.com/.well-known/jwks.json
  apple:
    issuer: https://appleid.apple.com
    jwks-uri: https://appleid.apple.com/auth/keys

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health

server:
  port: 8080
