spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:pickhouse}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:pickhouse}
    password: ${MYSQL_PASSWORD:pickhouse}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
pickhouse:
  jwt:
    issuer: ${JWT_ISSUER:https://dev-api.pickhouse.app}
    private-key-path: ${JWT_PRIVATE_KEY_PATH:classpath:jwt-private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:classpath:jwt-public.pem}
  storage:
    path: ${PICKHOUSE_STORAGE_PATH:./uploads}
    public-base-url: ${PICKHOUSE_PUBLIC_BASE_URL:http://localhost:8080}
logging:
  level:
    root: INFO
    app.pickhouse: DEBUG
